<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReadZone - My Library</title>
    <link rel="stylesheet" href="assets/css/main.css?v=1.1">
    <link rel="stylesheet" href="assets/css/components.css?v=1.1">
    <style>
        .list-view {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .list-item {
            display: flex;
            gap: 1.5rem;
            padding: 1.5rem;
            background: var(--bg-surface);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            align-items: center;
        }

        .list-cover {
            width: 60px;
            height: 90px;
            border-radius: 4px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .list-info {
            flex: 1;
        }

        .progress-track {
            background: var(--bg-app);
            height: 6px;
            border-radius: 3px;
            margin-top: 8px;
            width: 100%;
            max-width: 200px;
        }

        .progress-bar {
            background: var(--success);
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s;
        }
    </style>
</head>

<body>
    <header class="navbar">
        <div class="container nav-inner">
            <a href="reader_dashboard.html" class="nav-brand">ReadZone</a>
            <div style="flex: 1;"></div>
            <nav class="nav-links text-sm">
                <a href="reader_dashboard.html">Browse</a>
                <a href="my_books.html">My Library</a>
                <a href="my_lists.html">My Lists</a>
                <div class="nav-divider"></div>
                <a href="admin_dashboard.html" id="admin-link" class="hidden"
                    style="color: var(--primary); font-weight: 600;">⚙️ Admin</a>
                <a href="profile.html" id="nav-username" class="font-bold"></a>
                <a href="#" onclick="logout()" class="text-xs text-muted">Logout</a>
            </nav>
        </div>
    </header>

    <main class="container" style="padding: 2rem 20px;">
        <div class="flex justify-between items-center" style="margin-bottom: 2rem;">
            <h1 class="font-serif text-2xl">My Library</h1>
        </div>

        <div id="library-list" class="list-view">
            <!-- Content -->
        </div>
    </main>

    <script src="assets/js/api.js?v=1.1"></script>
    <script>
        checkAuth('reader');
        initNavbar();

        async function loadLibrary() {
            try {
                const data = await apiCall('/reader/saved_books.php');
                const container = document.getElementById('library-list');

                if (data.length === 0) {
                    container.innerHTML = '<div style="text-align:center; padding: 4rem;">You haven\'t saved any books yet. <a href="reader_dashboard.html" style="color:var(--primary)">Go Browse</a></div>';
                    return;
                }

                container.innerHTML = data.map(book => `
                    <div class="list-item">
                        <img src="/readzone/${book.cover_path}" class="list-cover" onerror="this.src='https://placehold.co/60x90'">
                        <div class="list-info">
                            <h3 class="font-serif text-xl">${book.title}</h3>
                            <p class="text-muted">${book.author}</p>
                            <div class="progress-track">
                                <div class="progress-bar" style="width: ${book.progress_percentage}%"></div>
                            </div>
                            <p class="text-sm text-muted" style="margin-top: 5px;">${book.progress_percentage}% Complete</p>
                        </div>
                        <div>
                            <a href="book_details.html?id=${book.book_id}" class="btn btn-primary">
                                View Details
                            </a>
                            <button onclick="removeBook(event, ${book.book_id})" class="text-xs text-muted hover:text-red-500" style="display:block; margin-top:0.5rem; width:100%; border:none; background:none; cursor:pointer;">
                                Remove
                            </button>
                        </div>
                    </div>
                `).join('');

            } catch (e) { }
        }

        async function removeBook(e, id) {
            e.preventDefault();
            if (!confirm("Remove from library?")) return;
            try {
                await apiCall('/reader/saved_books.php?action=remove', 'POST', { book_id: id });
                showToast('Removed', 'success');
                loadLibrary(); // Reload list
            } catch (e) { }
        }

        loadLibrary();
    </script>
</body>

</html>
