<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReadZone - Reset Password</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
    </style>
</head>

<body>
    <div style="width: 100%; max-width: 400px;">
        <div class="card">
            <h3 class="input-label" style="font-size: 1.2rem;">Reset Password</h3>

            <!-- Step 1 -->
            <form id="init-form">
                <div class="input-group">
                    <label class="input-label">Email Address</label>
                    <input type="email" id="email" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Continue</button>
            </form>

            <!-- Step 2 -->
            <form id="reset-form" class="hidden">
                <div class="input-group">
                    <label class="input-label">New Password</label>
                    <input type="password" id="new_pass" required>
                </div>

                <p class="text-sm text-muted" style="margin-bottom: 10px;">Verify identity using ONE of these methods:
                </p>

                <div
                    style="background: var(--bg-app); padding: 10px; border-radius: var(--radius-sm); margin-bottom: 10px;">
                    <label class="input-label text-sm">Option A: OTP Code</label>
                    <input type="text" id="otp" placeholder="Check email...">

                </div>

                <div
                    style="background: var(--bg-app); padding: 10px; border-radius: var(--radius-sm); margin-bottom: 15px;">
                    <label class="input-label text-sm">Option B: Security Question</label>
                    <p id="sec-q" class="text-sm" style="margin-bottom: 5px; font-style: italic;"></p>
                    <input type="text" id="sec-ans" placeholder="Answer...">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Reset Password</button>
            </form>

            <div class="mt-4 text-center">
                <a href="login.html" class="text-sm text-muted">Back to Login</a>
            </div>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script>
        let email = '';
        document.getElementById('init-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            showGlobalLoading("Checking Email...");
            email = document.getElementById('email').value;
            try {
                const res = await apiCall('/auth/forgot_password.php', 'POST', { action: 'initiate', email });
                document.getElementById('init-form').classList.add('hidden');
                document.getElementById('reset-form').classList.remove('hidden');
                document.getElementById('sec-q').textContent = res.security_question;
            } catch (e) { } finally {
                hideGlobalLoading();
            }
        });

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                action: 'reset',
                email: email,
                new_password: document.getElementById('new_pass').value
            };

            const otp = document.getElementById('otp').value;
            const ans = document.getElementById('sec-ans').value;
            if (otp) data.otp = otp;
            if (ans) data.security_answer = ans;

            try {
                await apiCall('/auth/forgot_password.php', 'POST', data);
                showToast('Password updated!', 'success');
                setTimeout(() => window.location.href = 'login.html', 1500);
            } catch (e) { }
        });
    </script>
</body>

</html>
