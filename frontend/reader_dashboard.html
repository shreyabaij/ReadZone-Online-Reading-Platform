<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReadZone - Library</title>
    <link rel="stylesheet" href="assets/css/main.css?v=1.1">
    <link rel="stylesheet" href="assets/css/components.css?v=1.1">
    <style>
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 3rem;
            align-items: stretch;
        }

        .book-card {
            display: flex;
            flex-direction: column;
            height: 100%;
            cursor: pointer;
            transition: all var(--trans-fast);
            background: var(--bg-surface);
            border-radius: var(--radius-md);
        }

        .book-card:hover {
            transform: translateY(-8px);
        }

        .book-cover {
            height: 330px;
            background: #f1f5f9;
            border-radius: var(--radius-md);
            overflow: hidden;
            position: relative;
            box-shadow: var(--shadow-md);
            flex-shrink: 0;
            margin-bottom: 0;
            /* Changed to handle spacing in info */
        }

        .book-card:hover .book-cover {
            box-shadow: var(--shadow-lg);
        }

        .book-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .book-card:hover .book-cover img {
            transform: scale(1.05);
        }

        .book-info {
            flex: 1;
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
        }

        .book-title {
            font-weight: 700;
            margin-bottom: 0.5rem;
            font-family: 'Merriweather', serif;
            font-size: 1.15rem;
            color: var(--text-main);
            /* Ensure title takes up space but doesn't overflow */
            line-height: 1.4;
        }

        .book-author {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            flex-grow: 1;
            /* Pushes button to bottom */
        }

        .category-section {
            background: white;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: all var(--trans-fast);
            box-shadow: var(--shadow-sm);
        }

        .category-section:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-md);
        }

        .category-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.75rem 2rem;
            background: white;
            border: none;
            cursor: pointer;
            text-align: left;
        }

        .category-arrow {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-app);
            border-radius: 50%;
            color: var(--text-muted);
            transition: all var(--trans-fast);
        }

        .category-section:hover .category-arrow {
            background: var(--primary);
            color: white;
            transform: scale(1.1);
        }

        .text-3xl {
            font-size: 1.875rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }
    </style>
</head>

<body>
    <header class="navbar">
        <div class="container nav-inner">
            <a href="reader_dashboard.html" class="nav-brand">ReadZone</a>
            <div style="flex: 1;"></div>
            <nav class="nav-links text-sm">
                <a href="reader_dashboard.html">Browse</a>
                <a href="my_books.html">My Library</a>
                <a href="my_lists.html">My Lists</a>
                <div class="nav-divider"></div>
                <a href="admin_dashboard.html" id="admin-link" class="hidden"
                    style="color: var(--primary); font-weight: 700;">⚙️ Admin</a>
                <a href="profile.html" id="nav-username" class="font-bold"></a>
                <a href="#" onclick="logout()" class="text-xs text-muted">Logout</a>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <div style="background: var(--grad-primary); padding: 4rem 0; color: white;">
        <div class="container">
            <h1 class="font-serif" style="font-size: 3rem; margin-bottom: 1rem; letter-spacing: -1.5px;">Discover your
                next story</h1>
            <p style="font-size: 1.1rem; opacity: 0.9; max-width: 600px; margin-bottom: 2rem;">Explore our extensive
                library of digital books across every genre. Find your next favorite read today.</p>

            <div style="position: relative; max-width: 500px;">
                <input type="text" id="search" placeholder="Search by title, author..."
                    style="background: white; border: none; padding: 1rem 1.5rem 1rem 3rem; box-shadow: var(--shadow-lg); font-size: 1rem;">
                <span
                    style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); opacity: 0.5;">🔍</span>
            </div>
        </div>
    </div>

    <main class="container" style="padding: 4rem 20px;">
        <!-- New Arrivals -->
        <section style="margin-bottom: 5rem;">
            <div class="flex justify-between items-center" style="margin-bottom: 2rem;">
                <h2 class="font-serif text-3xl">Lately Published</h2>
                <div style="width: 60px; height: 4px; background: var(--grad-primary); border-radius: 2px;"></div>
            </div>
            <div id="new-arrivals" class="book-grid">
                <div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 4rem;">Loading...
                </div>
            </div>
        </section>

        <!-- Categories -->
        <section>
            <h2 class="font-serif text-3xl" style="margin-bottom: 2rem;">Explore Categories</h2>
            <div id="categories-container" style="display: flex; flex-direction: column; gap: 1.5rem;">
                <!-- Categories injected here -->
            </div>
        </section>
    </main>

    <script src="assets/js/api.js?v=1.1"></script>
    <script>
        checkAuth('reader');
        initNavbar();

        const searchInput = document.getElementById('search');
        let debounceTimer;

        searchInput.addEventListener('keyup', (e) => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => loadBooks(e.target.value), 300);
        });

        const CATEGORIES = [
            "All", "Fiction", "Non-Fiction", "Science Fiction", "Fantasy", "Mystery",
            "Thriller", "Romance", "Horror", "Biography", "History", "Self-Help",
            "Philosophy", "Technology", "Education", "Children’s Literature"
        ];

        async function loadBooks(query = '') {
            try {
                // Parallel fetch
                const [booksData, savedData] = await Promise.all([
                    apiCall(query ? `/reader/books.php?title=${query}` : '/reader/books.php'),
                    apiCall('/reader/saved_books.php')
                ]);

                if (!booksData.books || booksData.books.length === 0) {
                    document.getElementById('new-arrivals').innerHTML = '<div class="text-muted">No books found.</div>';
                    document.getElementById('categories-container').innerHTML = '';
                    return;
                }

                // Create Set for O(1) lookup
                const savedSet = new Set(savedData.map(b => b.book_id));

                // Process Books (Mark Saved)
                const allBooks = booksData.books.map(b => ({
                    ...b,
                    isSaved: savedSet.has(b.id)
                }));

                // 1. New Arrivals (Top 4)
                const recentBooks = query ? allBooks : allBooks.slice(0, 4);
                renderGrid('new-arrivals', recentBooks);

                if (query) {
                    document.getElementById('categories-container').innerHTML = '<div class="text-muted">Search results shown above.</div>';
                    return;
                }

                // 2. Categories
                renderCategories(allBooks);

            } catch (e) { console.error(e); }
        }

        function renderGrid(containerId, books) {
            const container = document.getElementById(containerId);
            if (!books.length) {
                container.innerHTML = '<div class="text-muted">No books.</div>';
                return;
            }
            container.innerHTML = books.map(book => createBookCard(book)).join('');
        }

        function createBookCard(book) {
            const btn = book.isSaved
                ? `<button class="btn btn-outline" style="width: 100%; border-color: var(--success); color: var(--success); pointer-events: none; opacity: 0.8;">Saved</button>`
                : `<button class="btn btn-primary unique-save-btn-${book.id}" style="width: 100%;" onclick="event.stopPropagation(); saveBook(${book.id})">Save Library</button>`;

            return `
                <div class="book-card" onclick="viewBook(${book.id})">
                    <div class="book-cover">
                        <img src="/readzone/${book.cover_path}" alt="${book.title}" onerror="this.src='https://placehold.co/220x330?text=No+Cover'">
                    </div>
                    <div class="book-info">
                        <div class="book-title">${book.title}</div>
                        <div class="book-author">${book.author}</div>
                        <div>${btn}</div>
                    </div>
                </div>
            `;
        }

        function renderCategories(allBooks) {
            const container = document.getElementById('categories-container');
            container.innerHTML = '';

            // Map books for easy access in "Load More"
            window.categoryData = {};

            CATEGORIES.forEach(cat => {
                let catBooks = [];
                if (cat === "All") {
                    // Show ALL books in the 'All' category
                    catBooks = allBooks;
                } else {
                    catBooks = allBooks.filter(b =>
                        b.categories && b.categories.toLowerCase().includes(cat.toLowerCase())
                    );
                }

                if (catBooks.length > 0) {
                    window.categoryData[cat] = catBooks; // Store for "Load More"
                    const initialBooks = catBooks.slice(0, 12);
                    const hasMore = catBooks.length > 12;

                    const section = document.createElement('div');
                    section.className = 'category-section';
                    section.innerHTML = `
                        <button class="category-header" onclick="toggleCategory(this)">
                            <span class="font-serif text-xl font-bold">${cat}</span>
                            <div class="flex items-center gap-4">
                                <span class="text-muted text-sm">${catBooks.length} books</span>
                                <div class="category-arrow">▼</div>
                            </div>
                        </button>
                        <div class="category-content hidden" style="padding: 2rem; border-top: 1px solid var(--border); background: #fafafa;">
                            <div id="grid-${cat.replace(/\s+/g, '-')}" class="book-grid">
                                ${initialBooks.map(b => createBookCard(b)).join('')}
                            </div>
                            ${hasMore ? `
                                <div class="load-more-container" style="text-align: center; margin-top: 4rem;">
                                    <button class="btn btn-outline" style="min-width: 250px;" 
                                        onclick="showMoreBooks('${cat}', this)">Load More Books</button>
                                </div>
                            ` : ''}
                        </div>
                    `;
                    container.appendChild(section);
                }
            });
        }

        function showMoreBooks(cat, btn) {
            const books = window.categoryData[cat];
            const gridId = `grid-${cat.replace(/\s+/g, '-')}`;
            const grid = document.getElementById(gridId);

            // Render the rest
            const remainingBooks = books.slice(12);
            grid.innerHTML += remainingBooks.map(b => createBookCard(b)).join('');

            // Hide the button container
            btn.parentElement.remove();
        }

        function toggleCategory(btn) {
            const content = btn.nextElementSibling;
            content.classList.toggle('hidden');
            const arrow = btn.querySelector('.category-arrow');
            if (content.classList.contains('hidden')) {
                arrow.textContent = '▼';
            } else {
                arrow.textContent = '▲';
            }
        }

        async function saveBook(id) {
            try {
                await apiCall('/reader/saved_books.php', 'POST', { book_id: id, action: 'add' });
                showToast('Added to library', 'success');

                // Update ALL buttons for this book ID on the page (synced across categories)
                const btns = document.querySelectorAll(`.unique-save-btn-${id}`);
                btns.forEach(btn => {
                    btn.className = "btn btn-outline";
                    btn.style.color = "var(--success)";
                    btn.style.borderColor = "var(--success)";
                    btn.style.background = "transparent";
                    btn.style.boxShadow = "none";
                    btn.style.pointerEvents = "none";
                    btn.textContent = "Saved";
                    btn.onclick = null;
                });
            } catch (e) { showToast(e.message, 'error'); }
        }

        function viewBook(id) {
            window.location.href = `book_details.html?id=${id}`;
        }

        loadBooks();
    </script>
</body>

</html>
